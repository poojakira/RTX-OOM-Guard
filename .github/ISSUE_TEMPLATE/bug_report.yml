name: 🐛 Bug Report
description: Report a bug to help us improve rtx-oom-guard
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A concise description of what the bug is.
      placeholder: Describe the bug here...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this bug?
      placeholder: |
        1. Install rtx-oom-guard
        2. Run `python run_benchmark.py --config config.yaml`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The training should continue without OOM...
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Please provide your environment details (Python version, PyTorch version, GPU model, CUDA version).
      placeholder: |
        - OS: Windows 11
        - Python: 3.10
        - PyTorch: 2.1.0
        - GPU: RTX 3080
        - CUDA: 12.1
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant logs or error messages.
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues for similar bugs.
          required: true
        - label: I have provided a minimal reproduction case.
          required: true
